<!DOCTYPE html>
{% load static tailwind_tags %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MyShop{% endblock %}</title>
    {% tailwind_css %}
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
    </style>
</head>
<body style="background:#FFFBF5; color:#1C0A00; min-height:100vh;" class="flex flex-col">
    {% include 'navbar.html' %}
    <main class="flex-1">
        {% if messages %}
            <div class="max-w-7xl mx-auto px-4 pt-4 space-y-2">
                {% for message in messages %}
                    <div class="px-4 py-3 rounded-xl text-sm
                        {% if message.tags == 'success' %}bg-green-50 text-green-800 border border-green-200
                        {% elif message.tags == 'error' %}bg-red-50 text-red-800 border border-red-200
                        {% else %}text-orange-800 border border-orange-200{% endif %}"
                        {% if not message.tags == 'success' and not message.tags == 'error' %}style="background:#FEF3EC;"{% endif %}>
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
    {% include 'footer.html' %}
</body>
</html>

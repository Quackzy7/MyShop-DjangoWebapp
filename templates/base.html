<!DOCTYPE html>
{% load static tailwind_tags %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MyShop{% endblock %}</title>
    {% tailwind_css %}
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">
    {% include 'navbar.html' %}
    <main class="flex-1">
        {% if messages %}
            <div class="max-w-7xl mx-auto px-4 pt-4 space-y-2">
                {% for message in messages %}
                    <div class="px-4 py-3 rounded text-sm
                        {% if message.tags == 'success' %}bg-green-50 text-green-800 border border-green-200
                        {% elif message.tags == 'error' %}bg-red-50 text-red-800 border border-red-200
                        {% else %}bg-blue-50 text-blue-800 border border-blue-200{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
     {% include 'footer.html' %}
</body>
</html>

{% extends 'base.html' %}

{% block title %}Payment — MyShop{% endblock %}

{% block content %}

<div class="min-h-[70vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-sm">

        <div class="mb-8 text-center">
            <h1 class="text-2xl font-bold" style="color:#1C0A00;">Complete Payment</h1>
            <p class="mt-1 text-sm" style="color:#92400E;">Enter your card details to finish</p>
        </div>

        <form id="payment-form" class="space-y-5">

            <div>
                <label class="block text-sm font-medium mb-1" style="color:#78350F;">Card Details</label>
                <div id="card-element" class="w-full px-3 py-3 rounded-xl transition-colors" style="border:1px solid #FDDCCA; background:#FFF7ED;"></div>
                <div id="card-errors" role="alert" class="mt-2 text-xs" style="color:#B91C1C;"></div>
            </div>

            <button id="pay-button" type="submit" class="w-full py-3 px-4 text-sm font-semibold rounded-xl transition-colors disabled:opacity-50 disabled:cursor-not-allowed" style="background:#EA580C; color:#FFFBF5;" onmouseover="this.style.background='#C2410C'" onmouseout="this.style.background='#EA580C'">
                Pay ${{ order.total_price }}
            </button>

        </form>

    </div>
</div>

<script src="https://js.stripe.com/v3/"></script>
<script>
    var stripe = Stripe("{{ stripe_public_key }}");
    var elements = stripe.elements();

    var card = elements.create("card", {
        style: {
            base: {
                fontSize: '14px',
                color: '#1C0A00',
                '::placeholder': { color: '#FDA07A' },
                fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif',
            }
        }
    });
    card.mount("#card-element");

    var form = document.getElementById("payment-form");
    var errorEl = document.getElementById("card-errors");
    var payBtn = document.getElementById("pay-button");

    form.addEventListener("submit", function(event) {
        event.preventDefault();
        payBtn.disabled = true;
        payBtn.textContent = "Processing...";
        errorEl.textContent = "";

        stripe.confirmCardPayment("{{ client_secret }}", {
            payment_method: { card: card }
        }).then(function(result) {
            if (result.error) {
                errorEl.textContent = result.error.message;
                payBtn.disabled = false;
                payBtn.textContent = "Pay ${{ order.total_price }}";
            } else {
                if (result.paymentIntent.status === "succeeded") {
                    window.location.href = "{% url 'stripe_success' %}?payment_intent=" + result.paymentIntent.id;
                }
            }
        });
    });
</script>

{% endblock %}

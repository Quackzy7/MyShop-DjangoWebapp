{% extends 'base.html' %}

{% block title %}Payment — MyShop{% endblock %}

{% block content %}

<div class="min-h-[70vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-sm">

        <div class="mb-8 text-center">
            <h1 class="text-2xl font-semibold text-gray-900">Complete Payment</h1>
            <p class="mt-1 text-sm text-gray-500">Enter your card details to finish</p>
        </div>

        <form id="payment-form" class="space-y-5">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Card Details</label>
                <div id="card-element" class="w-full px-3 py-3 border border-gray-300 rounded-lg bg-white focus-within:border-gray-500 transition-colors"></div>
                <div id="card-errors" role="alert" class="mt-2 text-xs text-red-600"></div>
            </div>

            <button id="pay-button" type="submit" class="w-full py-2.5 px-4 bg-gray-900 text-white text-sm font-medium rounded-lg hover:bg-gray-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                Pay ${{ order.total_price }}
            </button>

        </form>

    </div>
</div>

<script src="https://js.stripe.com/v3/"></script>
<script>
    var stripe = Stripe("{{ stripe_public_key }}");
    var elements = stripe.elements();

    var card = elements.create("card", {
        style: {
            base: {
                fontSize: '14px',
                color: '#111827',
                '::placeholder': { color: '#9ca3af' }
            }
        }
    });
    card.mount("#card-element");

    var form = document.getElementById("payment-form");
    var errorEl = document.getElementById("card-errors");
    var payBtn = document.getElementById("pay-button");

    form.addEventListener("submit", function(event) {
        event.preventDefault();
        payBtn.disabled = true;
        payBtn.textContent = "Processing...";
        errorEl.textContent = "";

        stripe.confirmCardPayment("{{ client_secret }}", {
            payment_method: { card: card }
        }).then(function(result) {
            if (result.error) {
                errorEl.textContent = result.error.message;
                payBtn.disabled = false;
                payBtn.textContent = "Pay ${{ order.total_price }}";
            } else {
                if (result.paymentIntent.status === "succeeded") {
                    window.location.href = "{% url 'stripe_success' %}?payment_intent=" + result.paymentIntent.id;
                }
            }
        });
    });
</script>

{% endblock %}

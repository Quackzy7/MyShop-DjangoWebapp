{% extends 'base.html' %}

{% block title %}Update Order Item — MyShop{% endblock %}

{% block content %}

<div class="min-h-[70vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-sm">

        <div class="mb-8">
            <a href="{% url 'seller_order_items' %}" class="text-sm text-gray-400 hover:text-gray-700 transition-colors">
                ← Back to Orders
            </a>
            <h1 class="mt-3 text-2xl font-semibold text-gray-900">Update Status</h1>
        </div>

        <div class="bg-white border border-gray-200 rounded-xl px-5 py-4 mb-6 space-y-2">
            <div class="flex justify-between text-sm">
                <span class="text-gray-400">Order</span>
                <span class="font-medium text-gray-900">#{{ item.order.id }}</span>
            </div>
            <div class="flex justify-between text-sm">
                <span class="text-gray-400">Product</span>
                <span class="font-medium text-gray-900">{{ item.product.name }}</span>
            </div>
            <div class="flex justify-between text-sm items-center">
                <span class="text-gray-400">Current Status</span>
                <span class="px-2 py-0.5 rounded-full text-xs font-medium
                    {% if item.status == 'delivered' %}bg-green-100 text-green-700
                    {% elif item.status == 'cancelled' %}bg-red-100 text-red-600
                    {% elif item.status == 'shipped' %}bg-blue-100 text-blue-700
                    {% else %}bg-gray-100 text-gray-500{% endif %}">
                    {{ item.status|capfirst }}
                </span>
            </div>
        </div>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">New Status</label>
                <select name="status" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg outline-none focus:border-gray-500 bg-white transition-colors">
                    <option value="processing">Processing</option>
                    <option value="shipped">Shipped</option>
                    <option value="delivered">Delivered</option>
                    <option value="cancelled">Cancelled</option>
                </select>
            </div>
            <button type="submit" class="w-full py-2.5 px-4 bg-gray-900 text-white text-sm font-medium rounded-lg hover:bg-gray-700 transition-colors">
                Update Status
            </button>
        </form>

    </div>
</div>

{% endblock %}

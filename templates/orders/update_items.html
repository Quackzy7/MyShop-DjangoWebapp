{% extends 'base.html' %}

{% block title %}Update Order Item — MyShop{% endblock %}

{% block content %}

<div class="min-h-[70vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-sm">

        <div class="mb-8">
            <a href="{% url 'seller_order_items' %}" class="text-sm transition-colors" style="color:#FDA07A;" onmouseover="this.style.color='#EA580C'" onmouseout="this.style.color='#FDA07A'">
                ← Back to Orders
            </a>
            <h1 class="mt-3 text-2xl font-bold" style="color:#1C0A00;">Update Status</h1>
        </div>

        <div class="rounded-2xl px-5 py-4 mb-6 space-y-3" style="background:#FFFFFF; border:1px solid #FDE8D8;">
            <div class="flex justify-between text-sm" style="border-bottom:1px solid #FEF3EC; padding-bottom:10px;">
                <span style="color:#FDA07A;">Order</span>
                <span class="font-semibold" style="color:#1C0A00;">#{{ item.order.id }}</span>
            </div>
            <div class="flex justify-between text-sm" style="border-bottom:1px solid #FEF3EC; padding-bottom:10px;">
                <span style="color:#FDA07A;">Product</span>
                <span class="font-semibold" style="color:#1C0A00;">{{ item.product.name }}</span>
            </div>
            <div class="flex justify-between text-sm items-center">
                <span style="color:#FDA07A;">Current Status</span>
                <span class="px-2.5 py-0.5 rounded-full text-xs font-medium
                    {% if item.status == 'delivered' %}bg-green-100 text-green-700
                    {% elif item.status == 'cancelled' %}bg-red-100 text-red-600
                    {% elif item.status == 'shipped' %}bg-blue-100 text-blue-700
                    {% else %}text-orange-700{% endif %}"
                    {% if item.status != 'delivered' and item.status != 'cancelled' and item.status != 'shipped' %}style="background:#FEF3EC;"{% endif %}>
                    {{ item.status|capfirst }}
                </span>
            </div>
        </div>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium mb-1" style="color:#78350F;">New Status</label>
                <select name="status" class="w-full px-3 py-2 text-sm rounded-xl outline-none transition-colors" style="border:1px solid #FDDCCA; background:#FFF7ED; color:#1C0A00;">
                    <option value="processing">Processing</option>
                    <option value="shipped">Shipped</option>
                    <option value="delivered">Delivered</option>
                    <option value="cancelled">Cancelled</option>
                </select>
            </div>
            <button type="submit" class="w-full py-3 px-4 text-sm font-semibold rounded-xl transition-colors" style="background:#EA580C; color:#FFFBF5;" onmouseover="this.style.background='#C2410C'" onmouseout="this.style.background='#EA580C'">
                Update Status
            </button>
        </form>

    </div>
</div>

{% endblock %}

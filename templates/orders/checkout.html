{% extends 'base.html' %}

{% block title %}Checkout — MyShop{% endblock %}

{% block content %}

<div class="min-h-[70vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-sm">

        <div class="mb-8 text-center">
            <h1 class="text-2xl font-bold" style="color:#1C0A00;">Checkout</h1>
            <p class="mt-1 text-sm" style="color:#92400E;">Review your details and place your order</p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}

            <!-- Delivery Details -->
            <div class="space-y-3">
                <h2 class="text-xs font-semibold uppercase tracking-widest" style="color:#FDA07A;">Delivery Details</h2>

                <div>
                    <label class="block text-sm font-medium mb-1" style="color:#78350F;">Shipping Address</label>
                    <textarea
                        name="shipping_address"
                        rows="3"
                        placeholder="Street, City, State, PIN"
                        required
                        class="w-full px-3 py-2 text-sm rounded-xl outline-none resize-none transition-colors"
                        style="border:1px solid #FDDCCA; background:#FFF7ED; color:#1C0A00;"
                        onfocus="this.style.borderColor='#EA580C'; this.style.boxShadow='0 0 0 2px rgba(234,88,12,0.15)'"
                        onblur="this.style.borderColor='#FDDCCA'; this.style.boxShadow='none'"
                    >{{ buyer_profile.shipping_address }}</textarea>
                </div>
            </div>

            <!-- Payment Method -->
            <div class="space-y-3">
                <h2 class="text-xs font-semibold uppercase tracking-widest" style="color:#FDA07A;">Payment Method</h2>

                <label class="flex items-center gap-4 p-4 rounded-2xl cursor-pointer transition-all has-[:checked]:ring-2" style="background:#FFFFFF; border:1px solid #FDE8D8; --tw-ring-color:#EA580C;">
                    <input type="radio" name="payment_method" value="stripe" required style="accent-color:#EA580C;">
                    <div>
                        <p class="text-sm font-semibold" style="color:#1C0A00;">Online Payment</p>
                        <p class="text-xs mt-0.5" style="color:#FDA07A;">Pay securely with Stripe</p>
                    </div>
                </label>

                <label class="flex items-center gap-4 p-4 rounded-2xl cursor-pointer transition-all has-[:checked]:ring-2" style="background:#FFFFFF; border:1px solid #FDE8D8; --tw-ring-color:#EA580C;">
                    <input type="radio" name="payment_method" value="cod" style="accent-color:#EA580C;">
                    <div>
                        <p class="text-sm font-semibold" style="color:#1C0A00;">Cash on Delivery</p>
                        <p class="text-xs mt-0.5" style="color:#FDA07A;">Pay when your order arrives</p>
                    </div>
                </label>
            </div>

            <button type="submit" class="w-full py-3 px-4 text-sm font-semibold rounded-xl transition-colors" style="background:#EA580C; color:#FFFBF5;" onmouseover="this.style.background='#C2410C'" onmouseout="this.style.background='#EA580C'">
                Place Order →
            </button>

        </form>

    </div>
</div>

{% endblock %}
